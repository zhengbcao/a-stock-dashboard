<title>A股财报看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #1a1a2e; }

/* ===== 顶部 ===== */
.header {
  background: #f4f5f7;
  color: #1a1a2e; padding: 28px 32px; text-align: center;
  border-bottom: 1px solid #e2e8f0;
}
.header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; color: #1a202c; }
.header .subtitle { font-size: 13px; color: #64748b; margin-bottom: 4px; }
.header .update-time { font-size: 12px; color: #a0aec0; }

/* ===== 筛选栏 ===== */
.toolbar {
  position: relative; z-index: 10;
  padding: 12px 32px; background: #fff; border-bottom: 1px solid #e2e8f0;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.toolbar input, .toolbar select {
  padding: 6px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 13px; outline: none;
}
.toolbar input:focus, .toolbar select:focus { border-color: #4a6cf7; box-shadow: 0 0 0 2px rgba(74,108,247,.15); }
.toolbar input { width: 200px; }
.toolbar .count { margin-left: auto; font-size: 13px; color: #718096; }

/* ===== 日期单选下拉 ===== */
.date-select {
  position: relative; display: inline-block;
}
.date-select .ds-btn {
  padding: 6px 14px; border: 1px solid #cbd5e0; border-radius: 6px;
  font-size: 13px; background: #fff; cursor: pointer;
  display: flex; align-items: center; gap: 6px; min-width: 130px;
  user-select: none; white-space: nowrap; transition: border-color .15s, box-shadow .15s;
}
.date-select .ds-btn:hover { border-color: #4a6cf7; }
.date-select.open .ds-btn { border-color: #4a6cf7; box-shadow: 0 0 0 2px rgba(74,108,247,.15); }
.date-select .ds-btn .arrow {
  font-size: 10px; color: #a0aec0; margin-left: auto;
  transition: transform .2s;
}
.date-select.open .ds-btn .arrow { transform: rotate(180deg); }
.date-select .ds-dropdown {
  display: none; position: absolute; top: calc(100% + 6px); left: 0;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,.10); z-index: 50;
  min-width: 150px; overflow: hidden;
  padding: 4px 0; animation: dsSlide .15s ease;
}
@keyframes dsSlide { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.date-select.open .ds-dropdown { display: block; }
.date-select .ds-item {
  padding: 8px 16px; cursor: pointer; font-size: 13px; color: #4a5568;
  transition: background .1s, color .1s;
}
.date-select .ds-item:hover { background: #f0f4ff; color: #3b5bdb; }
.date-select .ds-item.active {
  background: #eef2ff; color: #4a6cf7; font-weight: 600;
  position: relative;
}
.date-select .ds-item.active::before {
  content: '✓'; position: absolute; right: 14px;
  font-size: 12px; color: #4a6cf7;
}

/* ===== 表格容器 ===== */
.table-wrap { overflow-x: auto; padding: 16px 32px 32px; }
table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  background: #fff; border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06); font-size: 13px;
}

/* 一级分组行 */
thead tr.group-header th {
  text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 1px;
  padding: 9px 8px; white-space: nowrap;
  border-bottom: none;
  position: sticky; top: 0; z-index: 4;
  user-select: none;
}
thead tr.group-header th.grp-base {
  background: linear-gradient(180deg, #f1f3f9 0%, #e8ebf4 100%); color: #4a5568;
  border-radius: 12px 0 0 0;
}
thead tr.group-header th.grp-rev {
  background: linear-gradient(180deg, #fff0f0 0%, #ffe0e0 100%); color: #c53030;
}
thead tr.group-header th.grp-ded {
  background: linear-gradient(180deg, #eefaf2 0%, #d4f5de 100%); color: #276749;
}
thead tr.group-header th.grp-prof {
  background: linear-gradient(180deg, #eef6ff 0%, #d9ebfc 100%); color: #2b6cb0;
  border-radius: 0 12px 0 0;
}

/* 二级列头行 */
thead tr.col-header th {
  background: #fafbfe; color: #64748b;
  text-align: center; font-size: 11px; font-weight: 600;
  padding: 7px 6px; white-space: nowrap;
  border-bottom: 2px solid #e2e8f0;
  border-top: 1px solid rgba(0,0,0,.04);
  position: sticky; top: 33px; z-index: 3;
  cursor: pointer; user-select: none;
  transition: background .15s;
}
thead tr.col-header th:hover { background: #eef0f8; }
thead tr.col-header th.no-sort { cursor: default; }
thead tr.col-header th.no-sort:hover { background: #fafbfe; }

/* 分组间分隔线 */
thead tr.col-header th.col-first {
  border-left: 2px solid #e2e8f0;
}

/* 排序图标 */
.sort-icon {
  display: inline-block; margin-left: 2px;
  font-size: 9px; color: #c0c8d8; transition: transform .15s, color .15s;
  vertical-align: middle;
}
.sort-icon.desc { color: #4a6cf7; transform: rotate(0deg); }
.sort-icon.asc  { color: #4a6cf7; transform: rotate(180deg); }

/* 数据行 */
tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .15s; }
tbody tr:hover { background: #f7faff; }
td { padding: 12px 8px; vertical-align: middle; white-space: nowrap; }
td.code { font-family: 'Menlo','Consolas',monospace; font-weight: 500; color: #2d3748; }
td.spark-td { padding: 8px 6px; }
td.pct-td { text-align: right; font-weight: 600; font-size: 12px; min-width: 68px; }
td.col-first { border-left: 2px solid #f0f0f0; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-增长 { background: #c6f6d5; color: #22543d; }
.badge-下降 { background: #fed7d7; color: #9b2c2c; }
.badge-扭亏 { background: #c6f6d5; color: #276749; }
.badge-首亏 { background: #fed7d7; color: #9b2c2c; }
.badge-增亏 { background: #fed7d7; color: #9b2c2c; }
.badge-减亏 { background: #fefcbf; color: #975a16; }
.badge-- { background: #e2e8f0; color: #718096; }

.pct-pos { color: #e53e3e; }
.pct-neg { color: #38a169; }
.pct-na  { color: #cbd5e0; }

svg.spark { display: block; }

/* 全局 Tooltip */
#globalTip {
  display: none; position: fixed;
  background: #1a202c; color: #fff;
  padding: 10px 14px; border-radius: 8px;
  font-size: 12px; line-height: 1.7; white-space: nowrap;
  z-index: 99999; pointer-events: none;
  box-shadow: 0 6px 20px rgba(0,0,0,.3);
}
#globalTip::after {
  content: ''; position: absolute;
  left: 50%; transform: translateX(-50%);
  border: 6px solid transparent;
}
#globalTip.arrow-bottom::after { top: 100%; border-top-color: #1a202c; }
#globalTip.arrow-top::after    { bottom: 100%; border-bottom-color: #1a202c; }

const QUARTER_LABELS = ["2024Q1", "2024Q2", "2024Q3", "2024Q4", "2025Q1", "2025Q2", "2025Q3", "2025Q4", "2026Q1"];

/* ---------- 格式化 ---------- */
function formatNumTip(v) {
  if (v === null || v === undefined) return '-';
  const abs = Math.abs(v);
  if (abs >= 1e8) return (v / 1e8).toFixed(1) + '亿';
  if (abs >= 1e4) return Math.round(v / 1e4) + '万';
  return v.toFixed(0);
}

/* SVG 斜线阴影 pattern 定义 */
const DEFS = '<defs>' +
  '<pattern id="hatchRed" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(45)">' +
    '<line x1="0" y1="0" x2="0" y2="3" stroke="#e53e3e" stroke-width="2" stroke-opacity="0.6"/>' +
  '</pattern>' +
  '<pattern id="hatchGreen" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(45)">' +
    '<line x1="0" y1="0" x2="0" y2="3" stroke="#38a169" stroke-width="2" stroke-opacity="0.6"/>' +
  '</pattern>' +
'</defs>';

function sparkSVG(values) {
  var W = 130, H = 44, pad = 2;
  var n = values.length;
  var valid = values.filter(function(v) { return v !== null; });
  if (valid.length === 0) return '<svg class="spark" width="'+W+'" height="'+H+'"></svg>';
  var maxAbs = Math.max.apply(null, valid.map(Math.abs).concat([1e-9]));
  var barW = Math.max(3, (W - pad * 2) / n - 2);
  var gap = (W - pad * 2 - barW * n) / Math.max(n - 1, 1);
  var midY = H / 2;
  var scaleY = (H / 2 - 3);

  var lastIdx = -1;
  for (var i = n - 1; i >= 0; i--) { if (values[i] !== null) { lastIdx = i; break; } }

  var bars = DEFS;
  for (var i = 0; i < n; i++) {
    var v = values[i];
    if (v === null) continue;
    var x = pad + i * (barW + gap);
    var h = Math.max(1, Math.abs(v) / maxAbs * scaleY);
    var y = v >= 0 ? midY - h : midY;
    var solidColor = v >= 0 ? '#e53e3e' : '#38a169';

    if (i === lastIdx) {
      var patternId = v >= 0 ? 'hatchRed' : 'hatchGreen';
      bars += '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+h+'" fill="url(#'+patternId+')" stroke="'+solidColor+'" stroke-width="1.2" rx="1"/>';
    } else {
      bars += '<rect x="'+x+'" y="'+y+'" width="'+barW+'" height="'+h+'" fill="'+solidColor+'" rx="1"/>';
    }
  }
  bars += '<line x1="'+pad+'" y1="'+midY+'" x2="'+(W-pad)+'" y2="'+midY+'" stroke="#cbd5e0" stroke-width="0.5" stroke-dasharray="2,2"/>';
  return '<svg class="spark" width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg">'+bars+'</svg>';
}

/* Tooltip 用 body 浮层 */
var tipEl = document.getElementById('globalTip');
function showTip(e, html) {
  tipEl.innerHTML = html;
  tipEl.style.display = 'block';
  var rect = e.currentTarget.getBoundingClientRect();
  var tw = tipEl.offsetWidth, th = tipEl.offsetHeight;
  var left = rect.left + rect.width / 2 - tw / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
  if (rect.top - th - 10 > 0) {
    tipEl.style.top = (rect.top - th - 10) + 'px';
    tipEl.className = 'arrow-bottom';
  } else {
    tipEl.style.top = (rect.bottom + 10) + 'px';
    tipEl.className = 'arrow-top';
  }
  tipEl.style.left = left + 'px';
}
function hideTip() { tipEl.style.display = 'none'; }

function buildTooltipHTML(values, labels) {
  var lines = [];
  for (var i = 0; i < labels.length; i++) {
    lines.push(labels[i] + ': ' + formatNumTip(values[i]));
  }
  return lines.join('<br>');
}

function sparkCell(sparkData) {
  var svg = sparkSVG(sparkData);
  var encoded = encodeURIComponent(JSON.stringify(sparkData));
  return '<div class="spark-wrap" data-spark="'+encoded+'">' + svg + '</div>';
}

function pctCell(val) {
  if (val === null || val === undefined) return '<span class="pct-na">-</span>';
  var cls = val > 0 ? 'pct-pos' : (val < 0 ? 'pct-neg' : 'pct-na');
  var sign = val > 0 ? '+' : '';
  return '<span class="' + cls + '">' + sign + val.toFixed(1) + '%</span>';
}

/* 排序 — 默认按发布日期降序 */
var sortCol = 'pub_date', sortState = 'desc';
var data = RAW_DATA.slice();

/* 日期单选状态 */
var selectedDate = '';

function render() {
  var search = document.getElementById('search').value.toLowerCase();
  var typeF = document.getElementById('typeFilter').value;
  var indF = document.getElementById('industryFilter').value;
  var filtered = data.filter(function(r) {
    if (search && !(r.code.toLowerCase().indexOf(search) >= 0 || r.name.toLowerCase().indexOf(search) >= 0 || (r.industry||'').toLowerCase().indexOf(search) >= 0)) return false;
    if (typeF && r.type !== typeF) return false;
    if (indF && r.industry !== indF) return false;
    if (selectedDate && r.pub_date !== selectedDate) return false;
    return true;
  });

  if (sortCol && sortState) {
    var asc = sortState === 'asc';
    filtered.sort(function(a, b) {
      var va = a[sortCol], vb = b[sortCol];
      if (va === null || va === undefined) va = asc ? Infinity : -Infinity;
      if (vb === null || vb === undefined) vb = asc ? Infinity : -Infinity;
      if (typeof va === 'string') return asc ? va.localeCompare(vb) : vb.localeCompare(va);
      return asc ? va - vb : vb - va;
    });
  }

  var tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(function(r) {
    var badgeCls = 'badge badge-' + r.type;
    return '<tr>'
      + '<td class="code">' + r.code + '</td>'
      + '<td>' + r.name + '</td>'
      + '<td>' + (r.industry || '-') + '</td>'
      + '<td>' + r.pub_date + '</td>'
      + '<td><span class="' + badgeCls + '">' + r.type + '</span></td>'
      + '<td class="spark-td col-first">' + sparkCell(r.rev_spark) + '</td>'
      + '<td class="pct-td">' + pctCell(r.rev_yoy) + '</td>'
      + '<td class="pct-td">' + pctCell(r.rev_qoq) + '</td>'
      + '<td class="spark-td col-first">' + sparkCell(r.ded_spark) + '</td>'
      + '<td class="pct-td">' + pctCell(r.ded_yoy) + '</td>'
      + '<td class="pct-td">' + pctCell(r.ded_qoq) + '</td>'
      + '<td class="spark-td col-first">' + sparkCell(r.prof_spark) + '</td>'
      + '<td class="pct-td">' + pctCell(r.prof_yoy) + '</td>'
      + '<td class="pct-td">' + pctCell(r.prof_qoq) + '</td>'
      + '</tr>';
  }).join('');
  document.getElementById('countLabel').textContent = '共 ' + filtered.length + ' / ' + data.length + ' 只';

  document.querySelectorAll('.spark-wrap').forEach(function(wrap) {
    wrap.addEventListener('mouseenter', function(e) {
      var sparkData = JSON.parse(decodeURIComponent(this.dataset.spark));
      showTip(e, buildTooltipHTML(sparkData, QUARTER_LABELS));
    });
    wrap.addEventListener('mouseleave', hideTip);
  });
}

/* 填充筛选项 */
(function() {
  var types = Array.from(new Set(RAW_DATA.map(function(r) { return r.type; }))).sort();
  var industries = Array.from(new Set(RAW_DATA.map(function(r) { return r.industry; }).filter(function(v) { return v && v !== '-'; }))).sort();
  var tf = document.getElementById('typeFilter');
  types.forEach(function(t) { var o = document.createElement('option'); o.value = t; o.textContent = t; tf.appendChild(o); });
  var inf = document.getElementById('industryFilter');
  industries.forEach(function(t) { var o = document.createElement('option'); o.value = t; o.textContent = t; inf.appendChild(o); });
})();

/* 日期单选下拉 */
(function() {
  var dates = Array.from(new Set(RAW_DATA.map(function(r) { return r.pub_date; }))).sort();
  var dropdown = document.getElementById('dsDropdown');
  var label = document.getElementById('dsLabel');
  var btn = document.getElementById('dsBtn');
  var container = document.getElementById('dateSelect');

  var allItem = document.createElement('div');
  allItem.className = 'ds-item active';
  allItem.textContent = '全部日期';
  allItem.dataset.value = '';
  dropdown.appendChild(allItem);

  dates.forEach(function(d) {
    var item = document.createElement('div');
    item.className = 'ds-item';
    item.textContent = d;
    item.dataset.value = d;
    dropdown.appendChild(item);
  });

  dropdown.addEventListener('click', function(e) {
    var item = e.target.closest('.ds-item');
    if (!item) return;
    dropdown.querySelectorAll('.ds-item').forEach(function(i) { i.classList.remove('active'); });
    item.classList.add('active');
    selectedDate = item.dataset.value;
    label.textContent = selectedDate || '全部日期';
    container.classList.remove('open');
    render();
  });

  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    container.classList.toggle('open');
  });
  document.addEventListener('click', function(e) {
    if (!container.contains(e.target)) container.classList.remove('open');
  });
})();

document.getElementById('search').addEventListener('input', render);
document.getElementById('typeFilter').addEventListener('change', render);
document.getElementById('industryFilter').addEventListener('change', render);

/* 排序 */
function updateSortIcons() {
  document.querySelectorAll('.col-header .sort-icon').forEach(function(icon) {
    icon.classList.remove('desc', 'asc');
  });
  if (sortCol && sortState) {
    var activeTh = document.querySelector('.col-header th[data-col="'+sortCol+'"]');
    if (activeTh) {
      var icon = activeTh.querySelector('.sort-icon');
      if (icon) icon.classList.add(sortState);
    }
  }
}

document.querySelectorAll('.col-header th[data-col]').forEach(function(th) {
  var col = th.dataset.col;
  if (th.classList.contains('no-sort')) return;
  th.addEventListener('click', function() {
    if (sortCol === col) {
      if (sortState === 'desc') sortState = 'asc';
      else { sortCol = null; sortState = null; }
    } else {
      sortCol = col; sortState = 'desc';
    }
    updateSortIcons();
    render();
  });
});

updateSortIcons();
render();
</script>
</body>
</html>
